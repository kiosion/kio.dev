name: notify kio.sh

on:
  push:
    branches: ["main"]
    paths:
      - "src/content/**"

concurrency:
  group: notify-kio-sh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint:check

  dispatch:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kio.sh deploy
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.KIO_SH_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kiosion/kio.sh/dispatches \
            -d '{"event_type":"content-updated"}'
