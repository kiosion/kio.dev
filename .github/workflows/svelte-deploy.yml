name: Deploy (SvelteKit)

on:
  push:
    branches: ["main"]

concurrency:
  group: svelte-deploy
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint:check

  deploy:
    needs: lint
    runs-on: ubuntu-latest

    env:
      SVELTE_ADAPTER_ENV: netlify
      VITE_APP_VERSION: ${{ github.sha }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --mode production

      - name: Deploy to Netlify
        run: pnpm netlify deploy --dir=./build --functions=./.netlify/functions-internal --prod --no-build
